<!DOCTYPE html>
<html>
<head>
    <title>Danish Legal</title>
    <style>
        body { margin:0; font-family:Arial,sans-serif; background:#f8fafc; color:#333; }
        .hero { background:linear-gradient(135deg,#1e3a8a,#3b82f6); color:white; padding:100px 20px; text-align:center; }
        h1 { margin:0; font-size:52px; }
        .btn { background:white; color:#1e3a8a; padding:15px 35px; border-radius:50px; text-decoration:none; font-weight:bold; margin-top:25px; display:inline-block; }
        .section { padding:60px 20px; text-align:center; }
        .form { max-width:500px; margin:0 auto; background:white; padding:30px; border-radius:12px; box-shadow:0 5px 15px rgba(0,0,0,0.1); }
        input, textarea { width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:6px; }
        button { background:#1e3a8a; color:white; padding:14px; width:100%; border:none; border-radius:6px; font-size:16px; cursor:pointer; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Danish Legal</h1>
        <p style="font-size:24px;">Professional Legal Services</p>
        <a href="#contact" class="btn">Get Legal Help</a>
    </div>

    <div class="section">
        <h2>Our Services</h2>
        <p>Corporate Law • Family Law • Property Law • Legal Consultation</p>
    </div>

    <div class="section" id="contact">
        <div class="form">
            <h2>Contact Us</h2>
            <form action="https://formsubmit.co/your-email@gmail.com" method="POST">
                <input type="text" name="name" placeholder="Your Name" required>
                <input type="email" name="email" placeholder="Your Email" required>
                <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
                <button type="submit">Send Message</button>
            </form>
        </div>
    </div>
</body>
</html>
